name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  go-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Format check
        run: |
          files=$(find . -type f -name '*.go' -not -path './vendor/*')
          unformatted=$(gofmt -l $files)
          if [ -n "$unformatted" ]; then
            echo "The following files need gofmt:"
            echo "$unformatted"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Build
        run: go build ./...
